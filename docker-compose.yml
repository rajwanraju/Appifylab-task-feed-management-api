services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: social_feed
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  floci:
    image: floci/floci:latest
    ports:
      - '4566:4566'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      FLOCI_SERVICES: s3
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:4566/_localstack/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - '8000:8000'
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/social_feed?schema=public
      JWT_SECRET: 4a7b25a06aaeed2aef99a7db0a44987c99dc3566887cf44f412127cc162f905d
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
      S3_ENDPOINT: http://floci:4566
      S3_BUCKET: uploads
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: test
      S3_SECRET_ACCESS_KEY: test
      S3_PUBLIC_URL: http://localhost:4566
    depends_on:
      db:
        condition: service_healthy
      floci:
        condition: service_started

volumes:
  pgdata:
